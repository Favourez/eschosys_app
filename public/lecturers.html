<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Lecturers | ESIMS</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body>
<div class="page-loader" id="pageLoader"><div class="spinner"></div></div>
<div id="app" class="app-wrapper d-none">
  <nav id="sidebar"></nav>
  <div class="main-content" id="mainContent">
    <header class="topnav" id="topnav"></header>
    <div class="page-content fade-in">

      <div class="page-header">
        <div><h1 class="page-title"><i class="fas fa-chalkboard-teacher me-2" style="color:var(--gold)"></i>Lecturers</h1><p class="page-subtitle">Manage academic lecturers</p></div>
        <button class="btn btn-primary fw-bold" onclick="openAdd()"><i class="fas fa-plus me-2"></i>Add Lecturer</button>
      </div>

      <div class="panel mb-3"><div class="panel-body py-2"><div class="row g-2 align-items-end">
        <div class="col-md-6"><div class="input-icon"><i class="fas fa-search"></i><input type="text" class="form-control" id="searchInput" placeholder="Search name, email, specialization…"></div></div>
        <div class="col-md-6 d-flex gap-2"><button class="btn btn-primary" onclick="loadLecturers()"><i class="fas fa-search me-1"></i>Search</button><button class="btn btn-outline-secondary" onclick="document.getElementById('searchInput').value='';loadLecturers()"><i class="fas fa-redo"></i></button></div>
      </div></div></div>

      <!-- Lecturer Cards -->
      <div class="row g-3" id="lecturerGrid">
        <div class="col-12 text-center py-5"><div class="spinner-border text-primary"></div></div>
      </div>
    </div>
  </div>
</div>

<!-- Modal -->
<div class="modal fade" id="lecModal" tabindex="-1">
  <div class="modal-dialog"><div class="modal-content">
    <div class="modal-header"><h5 class="modal-title" id="modalTitle">Add Lecturer</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
    <div class="modal-body">
      <form id="lecForm">
        <input type="hidden" id="lecId">
        <div class="row g-3">
          <div class="col-12"><label class="form-label">Full Name *</label><input type="text" class="form-control" id="fName" required></div>
          <div class="col-md-6"><label class="form-label">Phone</label><input type="tel" class="form-control" id="fPhone"></div>
          <div class="col-md-6"><label class="form-label">Email</label><input type="email" class="form-control" id="fEmail"></div>
          <div class="col-md-6"><label class="form-label">Qualification</label><input type="text" class="form-control" id="fQual" placeholder="e.g. PhD, MSc, BSc"></div>
          <div class="col-md-6"><label class="form-label">Specialization</label><input type="text" class="form-control" id="fSpec" placeholder="e.g. Machine Learning"></div>
        </div>
      </form>
    </div>
    <div class="modal-footer"><button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button><button class="btn btn-primary fw-bold" id="saveBtn" onclick="saveLecturer()"><i class="fas fa-save me-2"></i>Save</button></div>
  </div></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="/assets/js/api.js"></script><script src="/assets/js/main.js"></script><script src="/assets/js/layout.js"></script>
<script>
const modal = new bootstrap.Modal(document.getElementById('lecModal'));
initLayout().then(() => loadLecturers());

async function loadLecturers() {
  const res = await API.lecturers.list({ search: document.getElementById('searchInput').value.trim() });
  const grid = document.getElementById('lecturerGrid');
  if (!res?.data?.length) { grid.innerHTML = '<div class="col-12"><div class="empty-state"><i class="fas fa-chalkboard-teacher"></i><h6>No lecturers found</h6></div></div>'; return; }
  grid.innerHTML = res.data.map(l => `
    <div class="col-md-6 col-lg-4">
      <div class="panel h-100">
        <div class="panel-body">
          <div class="d-flex align-items-center gap-3 mb-3">
            <img src="${avatarUrl(l.FullName)}" style="width:52px;height:52px;border-radius:50%;object-fit:cover;border:3px solid var(--gold)" alt="avatar">
            <div>
              <div style="font-weight:800;font-size:.95rem">${l.FullName}</div>
              <div style="font-size:.75rem;color:var(--gray-500)">${l.Specialization||'Lecturer'}</div>
            </div>
          </div>
          <div class="info-row"><span class="info-label">Qualification</span><span class="info-value">${l.Qualification||'—'}</span></div>
          <div class="info-row"><span class="info-label">Phone</span><span class="info-value">${l.Phone||'—'}</span></div>
          <div class="info-row"><span class="info-label">Email</span><span class="info-value" style="font-size:.78rem">${l.Email||'—'}</span></div>
          <div class="info-row"><span class="info-label">Courses</span><span class="info-value"><span class="badge bg-primary">${l.CourseCount||0} courses</span></span></div>
          <div class="d-flex gap-2 mt-3">
            <button class="btn btn-sm btn-outline-secondary flex-fill" onclick="editLecturer(${l.LecturerID})"><i class="fas fa-edit me-1"></i>Edit</button>
            <button class="btn btn-sm btn-outline-danger" onclick="deleteLecturer(${l.LecturerID},'${l.FullName.replace(/'/g,"\\'")}')"><i class="fas fa-trash"></i></button>
          </div>
        </div>
      </div>
    </div>`).join('');
}

function openAdd(){document.getElementById('lecId').value='';document.getElementById('lecForm').reset();document.getElementById('modalTitle').textContent='Add Lecturer';modal.show();}

async function editLecturer(id){
  const res=await API.lecturers.get(id);
  if(!res?.data)return showToast('Failed to load.','error');
  const l=res.data;
  document.getElementById('lecId').value=l.LecturerID;
  document.getElementById('fName').value=l.FullName||'';
  document.getElementById('fPhone').value=l.Phone||'';
  document.getElementById('fEmail').value=l.Email||'';
  document.getElementById('fQual').value=l.Qualification||'';
  document.getElementById('fSpec').value=l.Specialization||'';
  document.getElementById('modalTitle').textContent=`Edit — ${l.FullName}`;modal.show();
}

async function saveLecturer(){
  const btn=document.getElementById('saveBtn');
  const id=document.getElementById('lecId').value;
  const data={FullName:document.getElementById('fName').value.trim(),Phone:document.getElementById('fPhone').value,Email:document.getElementById('fEmail').value,Qualification:document.getElementById('fQual').value,Specialization:document.getElementById('fSpec').value};
  if(!data.FullName)return showToast('Full name required.','warning');
  setLoading(btn,true);
  const res=id?await API.lecturers.update(id,data):await API.lecturers.create(data);
  setLoading(btn,false);
  if(!res?.success)return showToast(res?.message||'Failed.','error');
  showToast(res.message,'success');modal.hide();loadLecturers();
}

async function deleteLecturer(id,name){
  if(!confirmAction(`Delete lecturer "${name}"?`))return;
  const res=await API.lecturers.delete(id);
  if(res?.success){showToast('Deleted.','success');loadLecturers();}
  else showToast(res?.message||'Failed.','error');
}
document.getElementById('searchInput').addEventListener('keydown',e=>{if(e.key==='Enter')loadLecturers();});
</script>
</body>
</html>
