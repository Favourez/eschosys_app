<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Staff | ESIMS</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body>
<div class="page-loader" id="pageLoader"><div class="spinner"></div></div>
<div id="app" class="app-wrapper d-none">
  <nav id="sidebar"></nav>
  <div class="main-content" id="mainContent">
    <header class="topnav" id="topnav"></header>
    <div class="page-content fade-in">
      <div class="page-header">
        <div><h1 class="page-title"><i class="fas fa-users me-2" style="color:var(--gold)"></i>Staff</h1><p class="page-subtitle">Manage administrative and support staff</p></div>
        <button class="btn btn-primary fw-bold" onclick="openAdd()"><i class="fas fa-plus me-2"></i>Add Staff</button>
      </div>
      <div class="panel mb-3"><div class="panel-body py-2"><div class="row g-2"><div class="col-md-5"><div class="input-icon"><i class="fas fa-search"></i><input type="text" class="form-control" id="searchInput" placeholder="Search name, position, email…"></div></div><div class="col-md-3 d-flex gap-2"><button class="btn btn-primary" onclick="loadStaff()"><i class="fas fa-search me-1"></i>Search</button><button class="btn btn-outline-secondary" onclick="document.getElementById('searchInput').value='';loadStaff()"><i class="fas fa-redo"></i></button></div></div></div></div>
      <div class="tbl-wrap">
        <div class="tbl-head"><h5><i class="fas fa-list me-2" style="color:var(--primary)"></i>Staff Members <span class="badge bg-primary" id="totalBadge">0</span></h5></div>
        <div class="table-responsive">
          <table class="table table-hover" id="staffTable">
            <thead><tr><th>#</th><th>Name</th><th>Position</th><th>Phone</th><th>Email</th><th>Date Employed</th><th class="text-center">Actions</th></tr></thead>
            <tbody id="staffBody"><tr><td colspan="7" class="text-center py-5"><div class="spinner-border text-primary"></div></td></tr></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="modal fade" id="staffModal" tabindex="-1">
  <div class="modal-dialog"><div class="modal-content">
    <div class="modal-header"><h5 class="modal-title" id="modalTitle">Add Staff</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
    <div class="modal-body">
      <form id="staffForm">
        <input type="hidden" id="staffId">
        <div class="row g-3">
          <div class="col-12"><label class="form-label">Full Name *</label><input type="text" class="form-control" id="fName" required></div>
          <div class="col-12"><label class="form-label">Position *</label><input type="text" class="form-control" id="fPosition" required placeholder="e.g. Registrar, Secretary, IT Support"></div>
          <div class="col-md-6"><label class="form-label">Phone</label><input type="tel" class="form-control" id="fPhone"></div>
          <div class="col-md-6"><label class="form-label">Email</label><input type="email" class="form-control" id="fEmail"></div>
          <div class="col-md-6"><label class="form-label">Date Employed</label><input type="date" class="form-control" id="fDate"></div>
        </div>
      </form>
    </div>
    <div class="modal-footer"><button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button><button class="btn btn-primary fw-bold" id="saveBtn" onclick="saveStaff()"><i class="fas fa-save me-2"></i>Save</button></div>
  </div></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="/assets/js/api.js"></script><script src="/assets/js/main.js"></script><script src="/assets/js/layout.js"></script>
<script>
const modal=new bootstrap.Modal(document.getElementById('staffModal'));
initLayout().then(()=>loadStaff());

async function loadStaff(){
  const res=await API.staff.list({search:document.getElementById('searchInput').value.trim()});
  const tbody=document.getElementById('staffBody');
  if(!res?.data?.length){tbody.innerHTML='<tr><td colspan="7"><div class="empty-state"><i class="fas fa-users"></i><h6>No staff found</h6></div></td></tr>';document.getElementById('totalBadge').textContent='0';return;}
  document.getElementById('totalBadge').textContent=res.data.length;
  tbody.innerHTML=res.data.map((s,i)=>`<tr>
    <td>${i+1}</td>
    <td><div class="d-flex align-items-center gap-2"><img src="${avatarUrl(s.FullName)}" style="width:30px;height:30px;border-radius:50%;object-fit:cover" alt=""><span style="font-weight:600">${s.FullName}</span></div></td>
    <td><span class="badge bg-primary bg-opacity-10 text-primary">${s.Position}</span></td>
    <td style="font-size:.82rem">${s.Phone||'—'}</td>
    <td style="font-size:.8rem;color:var(--gray-500)">${s.Email||'—'}</td>
    <td style="font-size:.78rem">${fmtDate(s.DateEmployed)}</td>
    <td class="text-center">
      <button class="btn btn-sm btn-outline-secondary me-1" onclick="editStaff(${s.StaffID})"><i class="fas fa-edit"></i></button>
      <button class="btn btn-sm btn-outline-danger" onclick="deleteStaff(${s.StaffID},'${s.FullName.replace(/'/g,"\\'")}')"><i class="fas fa-trash"></i></button>
    </td></tr>`).join('');
}

function openAdd(){document.getElementById('staffId').value='';document.getElementById('staffForm').reset();document.getElementById('modalTitle').textContent='Add Staff';modal.show();}

async function editStaff(id){
  const res=await API.staff.get(id);
  if(!res?.data)return showToast('Failed to load.','error');
  const s=res.data;
  document.getElementById('staffId').value=s.StaffID;
  document.getElementById('fName').value=s.FullName||'';
  document.getElementById('fPosition').value=s.Position||'';
  document.getElementById('fPhone').value=s.Phone||'';
  document.getElementById('fEmail').value=s.Email||'';
  document.getElementById('fDate').value=s.DateEmployed?.split('T')[0]||'';
  document.getElementById('modalTitle').textContent=`Edit — ${s.FullName}`;modal.show();
}

async function saveStaff(){
  const btn=document.getElementById('saveBtn');
  const id=document.getElementById('staffId').value;
  const data={FullName:document.getElementById('fName').value.trim(),Position:document.getElementById('fPosition').value.trim(),Phone:document.getElementById('fPhone').value,Email:document.getElementById('fEmail').value,DateEmployed:document.getElementById('fDate').value||null};
  if(!data.FullName||!data.Position)return showToast('Name and position required.','warning');
  setLoading(btn,true);
  const res=id?await API.staff.update(id,data):await API.staff.create(data);
  setLoading(btn,false);
  if(!res?.success)return showToast(res?.message||'Failed.','error');
  showToast(res.message,'success');modal.hide();loadStaff();
}

async function deleteStaff(id,name){
  if(!confirmAction(`Delete staff "${name}"?`))return;
  const res=await API.staff.delete(id);
  if(res?.success){showToast('Deleted.','success');loadStaff();}
  else showToast(res?.message||'Failed.','error');
}
document.getElementById('searchInput').addEventListener('keydown',e=>{if(e.key==='Enter')loadStaff();});
</script>
</body>
</html>
