<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Students | ESIMS</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body>
<div class="page-loader" id="pageLoader"><div class="spinner"></div></div>
<div id="app" class="app-wrapper d-none">
  <nav id="sidebar"></nav>
  <div class="main-content" id="mainContent">
    <header class="topnav" id="topnav"></header>
    <div class="page-content fade-in">

      <div class="page-header">
        <div><h1 class="page-title"><i class="fas fa-user-graduate me-2" style="color:var(--gold)"></i>Students</h1>
          <p class="page-subtitle">Manage all registered students</p></div>
        <button class="btn btn-primary fw-bold" onclick="openAddModal()"><i class="fas fa-plus me-2"></i>Add Student</button>
      </div>

      <!-- Filters -->
      <div class="panel mb-3">
        <div class="panel-body py-2">
          <div class="row g-2 align-items-end">
            <div class="col-md-4"><div class="input-icon"><i class="fas fa-search"></i><input type="text" class="form-control" id="searchInput" placeholder="Search name, email, phone…"></div></div>
            <div class="col-md-2"><select class="form-select" id="genderFilter"><option value="">All Genders</option><option>Male</option><option>Female</option><option>Other</option></select></div>
            <div class="col-md-3"><select class="form-select" id="programFilter"><option value="">All Programs</option></select></div>
            <div class="col-md-3 d-flex gap-2">
              <button class="btn btn-primary flex-fill" onclick="loadStudents(1)"><i class="fas fa-filter me-1"></i>Filter</button>
              <button class="btn btn-outline-secondary" onclick="resetFilters()"><i class="fas fa-redo"></i></button>
              <button class="btn btn-outline-success" onclick="exportCSV('studentsTable','students.csv')" title="Export CSV"><i class="fas fa-file-csv"></i></button>
            </div>
          </div>
        </div>
      </div>

      <!-- Table -->
      <div class="tbl-wrap">
        <div class="tbl-head">
          <h5><i class="fas fa-list me-2" style="color:var(--primary)"></i>All Students <span class="badge bg-primary" id="totalBadge">0</span></h5>
        </div>
        <div class="table-responsive">
          <table class="table table-hover" id="studentsTable">
            <thead><tr><th>#</th><th>Student ID</th><th>Full Name</th><th>Gender</th><th>Phone</th><th>Email</th><th>Program</th><th>Reg. Date</th><th class="text-center">Actions</th></tr></thead>
            <tbody id="studentsBody"><tr><td colspan="9" class="text-center py-5"><div class="spinner-border text-primary"></div></td></tr></tbody>
          </table>
        </div>
        <div class="d-flex justify-content-between align-items-center px-3 py-2 border-top">
          <small class="text-muted" id="pageInfo"></small>
          <div id="pagination"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Add/Edit Modal -->
<div class="modal fade" id="studentModal" tabindex="-1">
  <div class="modal-dialog modal-lg modal-dialog-scrollable">
    <div class="modal-content">
      <div class="modal-header"><h5 class="modal-title" id="modalTitle">Add New Student</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
      <div class="modal-body">
        <form id="studentForm" novalidate>
          <input type="hidden" id="studentId">
          <div class="form-section">Personal Information</div>
          <div class="row g-3 mb-3">
            <div class="col-md-6"><label class="form-label">First Name *</label><input type="text" class="form-control" id="fFirstName" name="FirstName" required></div>
            <div class="col-md-6"><label class="form-label">Last Name *</label><input type="text" class="form-control" id="fLastName" name="LastName" required></div>
            <div class="col-md-4"><label class="form-label">Gender</label><select class="form-select" id="fGender" name="Gender"><option>Male</option><option>Female</option><option>Other</option></select></div>
            <div class="col-md-4"><label class="form-label">Date of Birth</label><input type="date" class="form-control" id="fDOB" name="DateOfBirth"></div>
            <div class="col-md-4"><label class="form-label">Registration Date</label><input type="date" class="form-control" id="fRegDate" name="RegistrationDate"></div>
            <div class="col-md-6"><label class="form-label">Phone Number</label><input type="tel" class="form-control" id="fPhone" name="PhoneNumber" placeholder="+237 6XX XXX XXX"></div>
            <div class="col-md-6"><label class="form-label">Email</label><input type="email" class="form-control" id="fEmail" name="Email"></div>
            <div class="col-md-6">
              <label class="form-label">Region of Origin</label>
              <select class="form-select" id="fRegion" name="RegionOfOrigin">
                <option value="">— Select region —</option>
                <option>Adamawa</option>
                <option>Centre</option>
                <option>East</option>
                <option>Far North</option>
                <option>Littoral</option>
                <option>North</option>
                <option>North West</option>
                <option>South</option>
                <option>South West</option>
                <option>West</option>
              </select>
            </div>
            <div class="col-12"><label class="form-label">Address</label><textarea class="form-control" id="fAddress" name="Address" rows="2"></textarea></div>
          </div>
          <div class="form-section">Guardian Information</div>
          <div class="row g-3 mb-3">
            <div class="col-md-6"><label class="form-label">Guardian Name</label><input type="text" class="form-control" id="fGuardian" name="GuardianName"></div>
            <div class="col-md-6"><label class="form-label">Guardian Contact</label><input type="tel" class="form-control" id="fGuardianContact" name="GuardianContact"></div>
            <div class="col-md-6"><label class="form-label">National ID Number</label><input type="text" class="form-control" id="fNID" name="NationalIDNumber"></div>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button class="btn btn-primary fw-bold" id="saveBtn" onclick="saveStudent()"><i class="fas fa-save me-2"></i>Save Student</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="/assets/js/api.js"></script><script src="/assets/js/main.js"></script><script src="/assets/js/layout.js"></script>
<script>
let currentPage = 1;
const modal = new bootstrap.Modal(document.getElementById('studentModal'));

initLayout().then(async () => {
  const progs = await API.programs.list();
  if (progs?.data) {
    const sel = document.getElementById('programFilter');
    progs.data.forEach(p => sel.insertAdjacentHTML('beforeend', `<option value="${p.ProgramID}">${p.ProgramName}</option>`));
  }
  loadStudents(1);
});

async function loadStudents(page = 1) {
  currentPage = page;
  const params = { page, limit:20, search: document.getElementById('searchInput').value.trim(), gender: document.getElementById('genderFilter').value, program: document.getElementById('programFilter').value };
  const res = await API.students.list(params);
  const tbody = document.getElementById('studentsBody');
  if (!res?.data?.length) { tbody.innerHTML = '<tr><td colspan="9"><div class="empty-state"><i class="fas fa-user-graduate"></i><h6>No students found</h6><p>Try a different search or add a new student.</p></div></td></tr>'; document.getElementById('totalBadge').textContent='0'; return; }
  document.getElementById('totalBadge').textContent = res.pagination?.total || res.data.length;
  document.getElementById('pageInfo').textContent = `Showing ${res.data.length} of ${res.pagination?.total} students`;
  tbody.innerHTML = res.data.map((s,i) => `
    <tr>
      <td>${(page-1)*20+i+1}</td>
      <td><span class="id-badge">${s.StudentID}</span></td>
      <td><a href="/student-profile.html?id=${s.StudentID}" style="font-weight:600">${s.FirstName} ${s.LastName}</a></td>
      <td><span class="badge bg-${s.Gender==='Female'?'pink':'info'} bg-opacity-10 text-dark">${s.Gender||'—'}</span></td>
      <td style="font-size:.82rem">${s.PhoneNumber||'—'}</td>
      <td style="font-size:.8rem;color:var(--gray-500)">${s.Email||'—'}</td>
      <td style="font-size:.8rem">${s.ProgramName||'<span class="text-muted">Not enrolled</span>'}</td>
      <td style="font-size:.78rem">${fmtDate(s.RegistrationDate)}</td>
      <td class="text-center">
        <a href="/student-profile.html?id=${s.StudentID}" class="btn btn-sm btn-outline-primary me-1" title="View Profile"><i class="fas fa-eye"></i></a>
        <button class="btn btn-sm btn-outline-secondary me-1" onclick="editStudent('${s.StudentID}')" title="Edit"><i class="fas fa-edit"></i></button>
        <button class="btn btn-sm btn-outline-danger" onclick="deleteStudent('${s.StudentID}','${s.FirstName} ${s.LastName}')" title="Delete"><i class="fas fa-trash"></i></button>
      </td>
    </tr>`).join('');
  renderPagination('pagination', page, res.pagination?.totalPages || 1, loadStudents);
}

function resetFilters() { document.getElementById('searchInput').value=''; document.getElementById('genderFilter').value=''; document.getElementById('programFilter').value=''; loadStudents(1); }

function openAddModal() {
  document.getElementById('studentId').value='';
  document.getElementById('studentForm').reset();
  document.getElementById('fRegDate').value = new Date().toISOString().split('T')[0];
  document.getElementById('modalTitle').textContent='Add New Student';
  modal.show();
}

async function editStudent(id) {
  const res = await API.students.get(id);
  if (!res?.data) return showToast('Failed to load student.','error');
  const s = res.data;
  document.getElementById('studentId').value = s.StudentID;
  document.getElementById('fFirstName').value      = s.FirstName||'';
  document.getElementById('fLastName').value       = s.LastName||'';
  document.getElementById('fGender').value         = s.Gender||'Male';
  document.getElementById('fDOB').value            = s.DateOfBirth?.split('T')[0]||'';
  document.getElementById('fRegDate').value        = s.RegistrationDate?.split('T')[0]||'';
  document.getElementById('fPhone').value          = s.PhoneNumber||'';
  document.getElementById('fEmail').value          = s.Email||'';
  document.getElementById('fAddress').value        = s.Address||'';
  document.getElementById('fGuardian').value       = s.GuardianName||'';
  document.getElementById('fGuardianContact').value= s.GuardianContact||'';
  document.getElementById('fNID').value            = s.NationalIDNumber||'';
  document.getElementById('fRegion').value         = s.RegionOfOrigin||'';
  document.getElementById('modalTitle').textContent= `Edit Student — ${s.FirstName} ${s.LastName}`;
  modal.show();
}

async function saveStudent() {
  const btn = document.getElementById('saveBtn');
  const id  = document.getElementById('studentId').value;
  const data = { FirstName: document.getElementById('fFirstName').value.trim(), LastName: document.getElementById('fLastName').value.trim(), Gender: document.getElementById('fGender').value, DateOfBirth: document.getElementById('fDOB').value||null, RegistrationDate: document.getElementById('fRegDate').value, PhoneNumber: document.getElementById('fPhone').value, Email: document.getElementById('fEmail').value, Address: document.getElementById('fAddress').value, GuardianName: document.getElementById('fGuardian').value, GuardianContact: document.getElementById('fGuardianContact').value, NationalIDNumber: document.getElementById('fNID').value, RegionOfOrigin: document.getElementById('fRegion').value||null };
  if (!data.FirstName||!data.LastName) return showToast('First and last name are required.','warning');
  setLoading(btn,true);
  const res = id ? await API.students.update(id, data) : await API.students.create(data);
  setLoading(btn,false);
  if (!res?.success) return showToast(res?.message||'Failed to save student.','error');
  showToast(res.message||'Student saved.','success');
  modal.hide(); loadStudents(currentPage);
}

async function deleteStudent(id, name) {
  if (!confirmAction(`Delete student "${name}"? This will also remove all related records.`)) return;
  const res = await API.students.delete(id);
  if (!res?.success) return showToast(res?.message||'Delete failed.','error');
  showToast(res.message,'success'); loadStudents(currentPage);
}

document.getElementById('searchInput').addEventListener('keydown', e => { if(e.key==='Enter') loadStudents(1); });
</script>
</body>
</html>
