<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Certificates | ESIMS</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body>
<div class="page-loader" id="pageLoader"><div class="spinner"></div></div>
<div id="app" class="app-wrapper d-none">
  <nav id="sidebar"></nav>
  <div class="main-content" id="mainContent">
    <header class="topnav" id="topnav"></header>
    <div class="page-content fade-in">

      <div class="page-header">
        <div><h1 class="page-title"><i class="fas fa-certificate me-2" style="color:var(--gold)"></i>Certificates</h1><p class="page-subtitle">Issue and manage student certificates</p></div>
        <button class="btn btn-primary fw-bold" onclick="openAdd()"><i class="fas fa-plus me-2"></i>Issue Certificate</button>
      </div>

      <!-- Summary Cards -->
      <div class="row g-2 mb-3">
        <div class="col-6 col-md-3"><div class="stat-card"><div class="stat-icon" style="background:rgba(25,135,84,.1)"><i class="fas fa-check-circle" style="color:#198754"></i></div><div class="stat-value text-success" id="cntIssued">—</div><div class="stat-label">Issued</div></div></div>
        <div class="col-6 col-md-3"><div class="stat-card"><div class="stat-icon" style="background:rgba(10,77,140,.1)"><i class="fas fa-file-alt" style="color:var(--primary)"></i></div><div class="stat-value" id="cntDraft">—</div><div class="stat-label">Draft</div></div></div>
        <div class="col-6 col-md-3"><div class="stat-card"><div class="stat-icon" style="background:rgba(220,53,69,.1)"><i class="fas fa-ban" style="color:#dc3545"></i></div><div class="stat-value text-danger" id="cntRevoked">—</div><div class="stat-label">Revoked</div></div></div>
        <div class="col-6 col-md-3"><div class="stat-card"><div class="stat-icon" style="background:rgba(212,175,55,.12)"><i class="fas fa-certificate" style="color:var(--gold-dark)"></i></div><div class="stat-value" id="cntTotal">—</div><div class="stat-label">Total</div></div></div>
      </div>

      <!-- Filters -->
      <div class="panel mb-3"><div class="panel-body py-2"><div class="row g-2 align-items-end">
        <div class="col-md-4"><div class="input-icon"><i class="fas fa-search"></i><input type="text" class="form-control" id="searchInput" placeholder="Search student, cert type…"></div></div>
        <div class="col-md-2"><select class="form-select" id="statusFilter"><option value="">All Status</option><option>Issued</option><option>Draft</option><option>Revoked</option></select></div>
        <div class="col-md-4 d-flex gap-2"><button class="btn btn-primary flex-fill" onclick="loadCerts(1)"><i class="fas fa-filter me-1"></i>Filter</button><button class="btn btn-outline-secondary" onclick="resetFilters()"><i class="fas fa-redo"></i></button><button class="btn btn-outline-success" onclick="exportCSV('certsTable','certificates.csv')"><i class="fas fa-file-csv"></i></button></div>
      </div></div></div>

      <div class="tbl-wrap">
        <div class="tbl-head"><h5><i class="fas fa-list me-2" style="color:var(--primary)"></i>Certificate Records <span class="badge bg-primary" id="totalBadge">0</span></h5></div>
        <div class="table-responsive">
          <table class="table table-hover" id="certsTable">
            <thead><tr><th>#</th><th>Cert. No.</th><th>Student</th><th>Type</th><th>Program</th><th>Issue Date</th><th class="text-center">Status</th><th class="text-center">Actions</th></tr></thead>
            <tbody id="certsBody"><tr><td colspan="8" class="text-center py-5"><div class="spinner-border text-primary"></div></td></tr></tbody>
          </table>
        </div>
        <div class="d-flex justify-content-between align-items-center px-3 py-2 border-top"><small class="text-muted" id="pageInfo"></small><div id="pagination"></div></div>
      </div>
    </div>
  </div>
</div>

<!-- Issue Certificate Modal -->
<div class="modal fade" id="certModal" tabindex="-1">
  <div class="modal-dialog"><div class="modal-content">
    <div class="modal-header"><h5 class="modal-title" id="modalTitle">Issue Certificate</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
    <div class="modal-body">
      <form id="certForm">
        <input type="hidden" id="certId">
        <div class="row g-3">
          <div class="col-12"><label class="form-label">Student *</label><select class="form-select" id="fStudent" required><option value="">Select student…</option></select></div>
          <div class="col-md-6"><label class="form-label">Certificate Type *</label><select class="form-select" id="fType" required><option value="">Select type…</option><option>Completion Certificate</option><option>Internship Certificate</option><option>Merit Award</option><option>Participation Certificate</option><option>Academic Transcript</option></select></div>
          <div class="col-md-6"><label class="form-label">Certificate Number</label><input type="text" class="form-control" id="fNumber" placeholder="Auto-generated if blank"></div>
          <div class="col-md-6"><label class="form-label">Issue Date</label><input type="date" class="form-control" id="fDate"></div>
          <div class="col-md-6"><label class="form-label">Status</label><select class="form-select" id="fStatus"><option>Issued</option><option>Draft</option><option>Revoked</option></select></div>
          <div class="col-12"><label class="form-label">Remarks</label><textarea class="form-control" id="fRemarks" rows="2" placeholder="Additional notes…"></textarea></div>
        </div>
      </form>
    </div>
    <div class="modal-footer"><button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button><button class="btn btn-primary fw-bold" id="saveBtn" onclick="saveCert()"><i class="fas fa-save me-2"></i>Save</button></div>
  </div></div>
</div>

<!-- Certificate Preview Modal -->
<div class="modal fade" id="previewModal" tabindex="-1">
  <div class="modal-dialog modal-lg"><div class="modal-content">
    <div class="modal-header"><h5 class="modal-title">Certificate Preview</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
    <div class="modal-body p-0"><div id="certPreview" style="padding:2.5rem;background:#fff;min-height:400px"></div></div>
    <div class="modal-footer"><button class="btn btn-secondary" data-bs-dismiss="modal">Close</button><button class="btn btn-primary" onclick="printElement('certPreview')"><i class="fas fa-print me-1"></i>Print</button></div>
  </div></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="/assets/js/api.js"></script><script src="/assets/js/main.js"></script><script src="/assets/js/layout.js"></script>
<script>
let curPage=1;
const modal=new bootstrap.Modal(document.getElementById('certModal'));
const previewModal=new bootstrap.Modal(document.getElementById('previewModal'));

initLayout().then(async()=>{
  const students=await API.students.list({limit:1000});
  if(students?.data){
    const sel=document.getElementById('fStudent');
    students.data.forEach(s=>sel.insertAdjacentHTML('beforeend',`<option value="${s.StudentID}">${s.FirstName} ${s.LastName} (${s.StudentID})</option>`));
  }
  loadCerts(1);
});

async function loadCerts(page=1){
  curPage=page;
  const params={page,limit:20,search:document.getElementById('searchInput').value.trim(),status:document.getElementById('statusFilter').value};
  const res=await API.certificates.list(params);
  const tbody=document.getElementById('certsBody');
  if(res?.summary){
    document.getElementById('cntIssued').textContent=res.summary.issued||0;
    document.getElementById('cntDraft').textContent=res.summary.draft||0;
    document.getElementById('cntRevoked').textContent=res.summary.revoked||0;
    document.getElementById('cntTotal').textContent=res.pagination?.total||0;
  }
  if(!res?.data?.length){tbody.innerHTML='<tr><td colspan="8"><div class="empty-state"><i class="fas fa-certificate"></i><h6>No certificates found</h6></div></td></tr>';document.getElementById('totalBadge').textContent='0';return;}
  document.getElementById('totalBadge').textContent=res.pagination?.total||res.data.length;
  document.getElementById('pageInfo').textContent=`Showing ${res.data.length} of ${res.pagination?.total||res.data.length} records`;
  tbody.innerHTML=res.data.map((c,i)=>`<tr>
    <td>${(page-1)*20+i+1}</td>
    <td><span class="id-badge">${c.CertificateNumber||'—'}</span></td>
    <td><a href="/student-profile.html?id=${c.StudentID}" style="font-weight:600">${c.StudentName}</a></td>
    <td style="font-size:.82rem">${c.CertificateType}</td>
    <td style="font-size:.78rem;color:var(--gray-500)">${c.ProgramName||'—'}</td>
    <td style="font-size:.78rem">${fmtDate(c.IssueDate)}</td>
    <td class="text-center">${statusBadge(c.Status)}</td>
    <td class="text-center">
      <button class="btn btn-sm btn-outline-info me-1" onclick="previewCert(${c.CertificateID})" title="Preview"><i class="fas fa-eye"></i></button>
      <button class="btn btn-sm btn-outline-secondary me-1" onclick="editCert(${c.CertificateID})" title="Edit"><i class="fas fa-edit"></i></button>
      <button class="btn btn-sm btn-outline-danger" onclick="deleteCert(${c.CertificateID},'${(c.CertificateNumber||'').replace(/'/g,"\\'")}')"><i class="fas fa-trash"></i></button>
    </td></tr>`).join('');
  renderPagination('pagination',page,res.pagination?.totalPages||1,loadCerts);
}

function resetFilters(){document.getElementById('searchInput').value='';document.getElementById('statusFilter').value='';loadCerts(1);}

function openAdd(){
  document.getElementById('certId').value='';document.getElementById('certForm').reset();
  document.getElementById('fDate').value=new Date().toISOString().split('T')[0];
  document.getElementById('modalTitle').textContent='Issue Certificate';modal.show();
}

async function editCert(id){
  const res=await API.certificates.get(id);
  if(!res?.data)return showToast('Failed to load.','error');
  const c=res.data;
  document.getElementById('certId').value=c.CertificateID;
  document.getElementById('fStudent').value=c.StudentID;
  document.getElementById('fType').value=c.CertificateType;
  document.getElementById('fNumber').value=c.CertificateNumber||'';
  document.getElementById('fDate').value=c.IssueDate?.split('T')[0]||'';
  document.getElementById('fStatus').value=c.Status||'Issued';
  document.getElementById('fRemarks').value=c.Remarks||'';
  document.getElementById('modalTitle').textContent='Edit Certificate';modal.show();
}

async function saveCert(){
  const btn=document.getElementById('saveBtn');
  const id=document.getElementById('certId').value;
  const data={StudentID:document.getElementById('fStudent').value,CertificateType:document.getElementById('fType').value,CertificateNumber:document.getElementById('fNumber').value||null,IssueDate:document.getElementById('fDate').value||null,Status:document.getElementById('fStatus').value,Remarks:document.getElementById('fRemarks').value};
  if(!data.StudentID||!data.CertificateType)return showToast('Student and type are required.','warning');
  setLoading(btn,true);
  const res=id?await API.certificates.update(id,data):await API.certificates.create(data);
  setLoading(btn,false);
  if(!res?.success)return showToast(res?.message||'Failed.','error');
  showToast(res.message||'Saved!','success');modal.hide();loadCerts(curPage);
}

async function previewCert(id){
  const res=await API.certificates.get(id);
  if(!res?.data)return showToast('Certificate not found.','error');
  const c=res.data;
  document.getElementById('certPreview').innerHTML=`
  <div style="border:8px double var(--primary);padding:3rem;text-align:center;font-family:'Georgia',serif;position:relative">
    <div style="position:absolute;top:15px;left:15px;right:15px;bottom:15px;border:2px solid var(--gold);pointer-events:none"></div>
    <div style="font-size:1rem;color:var(--gold-dark);font-weight:700;letter-spacing:3px;text-transform:uppercase;margin-bottom:.5rem">Eschosys Technologies</div>
    <div style="font-size:.78rem;color:var(--gray-500);margin-bottom:1.5rem">Accacias, Yaoundé, Cameroon</div>
    <div style="font-size:2rem;font-weight:900;color:var(--primary);margin-bottom:.5rem;letter-spacing:1px">${c.CertificateType}</div>
    <div style="font-size:.85rem;color:var(--gray-500);margin-bottom:2rem">This is to certify that</div>
    <div style="font-size:1.8rem;font-weight:800;color:var(--text);border-bottom:2px solid var(--gold);display:inline-block;padding-bottom:.3rem;margin-bottom:1.5rem">${c.StudentName}</div>
    <div style="font-size:.9rem;color:var(--gray-600);margin-bottom:2rem">has successfully fulfilled the requirements of the program offered at Eschosys Technologies</div>
    <div style="display:flex;justify-content:space-between;margin-top:3rem;padding-top:1rem;border-top:1px solid var(--gray-200);font-size:.78rem;color:var(--gray-500)">
      <div><div style="border-top:1px solid var(--text);padding-top:.4rem;width:150px">Authorized Signature</div></div>
      <div><div><span style="font-weight:700">Cert. No:</span> ${c.CertificateNumber||'—'}</div><div><span style="font-weight:700">Date:</span> ${fmtDate(c.IssueDate)}</div></div>
    </div>
  </div>`;
  previewModal.show();
}

async function deleteCert(id,num){
  if(!confirmAction(`Delete certificate "${num}"?`))return;
  const res=await API.certificates.delete(id);
  if(res?.success){showToast('Certificate deleted.','success');loadCerts(curPage);}
  else showToast(res?.message||'Failed.','error');
}
document.getElementById('searchInput').addEventListener('keydown',e=>{if(e.key==='Enter')loadCerts(1);});
</script>
</body>
</html>
