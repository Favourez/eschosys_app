<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Login | ESIMS – Eschosys Technologies</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body>
<div class="login-page">
  <div class="login-card">
    <div class="login-logo"><span style="font-size:1.5rem;font-weight:900;color:#fff">ESC</span></div>
    <div class="text-center mb-4">
      <h4 style="font-weight:800;color:var(--primary);margin-bottom:.25rem">Welcome Back</h4>
      <p style="font-size:.82rem;color:var(--gray-500);margin:0">Eschosys Student & Intern Management System</p>
    </div>

    <div id="alertBox" class="alert d-none mb-3" role="alert"></div>

    <form id="loginForm" novalidate>
      <div class="mb-3">
        <label class="form-label">Username</label>
        <div class="input-icon">
          <i class="fas fa-user"></i>
          <input type="text" class="form-control" id="username" name="username" placeholder="Enter username" required autocomplete="username">
        </div>
      </div>
      <div class="mb-3">
        <label class="form-label">Password</label>
        <div class="input-icon">
          <i class="fas fa-lock"></i>
          <input type="password" class="form-control" id="password" name="password" placeholder="Enter password" required autocomplete="current-password">
          <button type="button" id="togglePwd" style="position:absolute;right:.75rem;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--gray-500);cursor:pointer;padding:0">
            <i class="fas fa-eye"></i>
          </button>
        </div>
      </div>
      <div class="d-flex justify-content-between align-items-center mb-4">
        <div class="form-check mb-0">
          <input class="form-check-input" type="checkbox" id="remember">
          <label class="form-check-label" for="remember" style="font-size:.82rem">Remember me</label>
        </div>
      </div>
      <button type="submit" class="btn w-100 fw-bold" id="loginBtn" style="background:var(--primary);color:#fff;padding:.65rem;border-radius:var(--r-sm);font-size:.95rem">
        <i class="fas fa-sign-in-alt me-2"></i>Sign In
      </button>
    </form>

    <div class="text-center mt-4" style="font-size:.75rem;color:var(--gray-500)">
      <i class="fas fa-shield-alt me-1" style="color:var(--gold)"></i>
      Secured with JWT Authentication &bull; Session expires in 8 hours
    </div>
    <div class="text-center mt-2" style="font-size:.72rem;color:var(--gray-500)">
      &copy; 2024 Eschosys Technologies &bull; Accacias, Yaoundé, Cameroon
    </div>
  </div>
</div>

<script src="/assets/js/api.js"></script>
<script src="/assets/js/main.js"></script>
<script>
// Redirect if already logged in
if (Auth.isLoggedIn()) window.location.href = '/dashboard.html';

// Session expired message
if (new URLSearchParams(location.search).get('expired')) {
  const box = document.getElementById('alertBox');
  box.className = 'alert alert-warning mb-3';
  box.innerHTML = '<i class="fas fa-clock me-2"></i>Your session expired. Please log in again.';
  box.classList.remove('d-none');
}

// Password toggle
document.getElementById('togglePwd').addEventListener('click', function() {
  const inp = document.getElementById('password');
  const showing = inp.type === 'text';
  inp.type = showing ? 'password' : 'text';
  this.querySelector('i').className = showing ? 'fas fa-eye' : 'fas fa-eye-slash';
});

// Login form
document.getElementById('loginForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  const btn  = document.getElementById('loginBtn');
  const box  = document.getElementById('alertBox');
  const user = document.getElementById('username').value.trim();
  const pass = document.getElementById('password').value;
  if (!user || !pass) { box.className='alert alert-danger mb-3'; box.innerHTML='<i class="fas fa-exclamation-circle me-2"></i>Please enter both username and password.'; box.classList.remove('d-none'); return; }
  box.classList.add('d-none');
  setLoading(btn, true);
  const res = await API.auth.login({ username: user, password: pass });
  setLoading(btn, false);
  if (!res || !res.success) {
    box.className = 'alert alert-danger mb-3';
    box.innerHTML = `<i class="fas fa-times-circle me-2"></i>${res?.message || 'Login failed. Try again.'}`;
    box.classList.remove('d-none');
    return;
  }
  Auth.set({ token: res.token, user: res.user });
  window.location.href = '/dashboard.html';
});
</script>
</body>
</html>
