<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Users | ESIMS</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body>
<div class="page-loader" id="pageLoader"><div class="spinner"></div></div>
<div id="app" class="app-wrapper d-none">
  <nav id="sidebar"></nav>
  <div class="main-content" id="mainContent">
    <header class="topnav" id="topnav"></header>
    <div class="page-content fade-in">

      <div class="page-header">
        <div><h1 class="page-title"><i class="fas fa-user-shield me-2" style="color:var(--gold)"></i>User Management</h1><p class="page-subtitle">Manage system access and roles</p></div>
        <button class="btn btn-primary fw-bold" onclick="openAdd()"><i class="fas fa-plus me-2"></i>Add User</button>
      </div>

      <ul class="nav nav-pills mb-4 gap-1">
        <li class="nav-item"><button class="nav-link active" onclick="switchTab('users',this)"><i class="fas fa-users me-1"></i>Users</button></li>
        <li class="nav-item"><button class="nav-link" onclick="switchTab('audit',this)"><i class="fas fa-history me-1"></i>Audit Logs</button></li>
        <li class="nav-item"><button class="nav-link" onclick="switchTab('pwd',this)"><i class="fas fa-key me-1"></i>Change Password</button></li>
      </ul>

      <!-- USERS TAB -->
      <div id="tab-users" class="tab-content-panel">
        <div class="tbl-wrap">
          <div class="tbl-head d-flex justify-content-between align-items-center">
            <h5><i class="fas fa-list me-2" style="color:var(--primary)"></i>System Users <span class="badge bg-primary" id="usersBadge">0</span></h5>
            <div class="input-icon" style="width:240px"><i class="fas fa-search"></i><input type="text" class="form-control" id="userSearch" placeholder="Search users…" oninput="initTableSearch('userSearch','usersTable')"></div>
          </div>
          <div class="table-responsive">
            <table class="table table-hover" id="usersTable">
              <thead><tr><th>#</th><th>Avatar</th><th>Full Name</th><th>Username</th><th>Email</th><th>Role</th><th class="text-center">Status</th><th>Last Login</th><th class="text-center">Actions</th></tr></thead>
              <tbody id="usersBody"><tr><td colspan="9" class="text-center py-5"><div class="spinner-border text-primary"></div></td></tr></tbody>
            </table>
          </div>
        </div>
      </div>

      <!-- AUDIT LOGS TAB -->
      <div id="tab-audit" class="tab-content-panel d-none">
        <div class="panel mb-3"><div class="panel-body py-2"><div class="row g-2 align-items-end">
          <div class="col-md-3"><label class="form-label mb-1" style="font-size:.78rem">User</label><select class="form-select" id="auditUserFilter"><option value="">All Users</option></select></div>
          <div class="col-md-3"><label class="form-label mb-1" style="font-size:.78rem">Action</label><select class="form-select" id="auditActionFilter"><option value="">All Actions</option><option>LOGIN</option><option>LOGOUT</option><option>CREATE</option><option>UPDATE</option><option>DELETE</option><option>VIEW</option></select></div>
          <div class="col-md-4 d-flex gap-2"><button class="btn btn-primary" onclick="loadAudit(1)"><i class="fas fa-filter me-1"></i>Filter</button><button class="btn btn-outline-secondary" onclick="document.getElementById('auditUserFilter').value='';document.getElementById('auditActionFilter').value='';loadAudit(1)"><i class="fas fa-redo"></i></button><button class="btn btn-outline-success" onclick="exportCSV('auditTable','audit-logs.csv')"><i class="fas fa-file-csv"></i></button></div>
        </div></div></div>
        <div class="tbl-wrap">
          <div class="tbl-head"><h5><i class="fas fa-history me-2" style="color:var(--primary)"></i>Audit Trail</h5></div>
          <div class="table-responsive">
            <table class="table table-hover" id="auditTable">
              <thead><tr><th>#</th><th>User</th><th>Action</th><th>Module</th><th>Details</th><th>IP Address</th><th>Timestamp</th></tr></thead>
              <tbody id="auditBody"><tr><td colspan="7" class="text-center py-4"><div class="spinner-border text-primary"></div></td></tr></tbody>
            </table>
          </div>
          <div class="d-flex justify-content-between align-items-center px-3 py-2 border-top"><small class="text-muted" id="auditPageInfo"></small><div id="auditPagination"></div></div>
        </div>
      </div>

      <!-- CHANGE PASSWORD TAB -->
      <div id="tab-pwd" class="tab-content-panel d-none">
        <div class="row justify-content-center"><div class="col-md-5">
          <div class="panel"><div class="panel-body">
            <h6 class="fw-bold mb-4"><i class="fas fa-key me-2" style="color:var(--gold-dark)"></i>Change Your Password</h6>
            <div class="mb-3"><label class="form-label">Current Password *</label><input type="password" class="form-control" id="pwdCurrent" placeholder="Enter current password"></div>
            <div class="mb-3"><label class="form-label">New Password *</label><input type="password" class="form-control" id="pwdNew" placeholder="Minimum 6 characters"></div>
            <div class="mb-4"><label class="form-label">Confirm New Password *</label><input type="password" class="form-control" id="pwdConfirm" placeholder="Re-enter new password"></div>
            <button class="btn btn-primary fw-bold w-100" id="pwdBtn" onclick="changePassword()"><i class="fas fa-lock me-2"></i>Update Password</button>
          </div></div>
        </div></div>
      </div>

    </div>
  </div>
</div>

<!-- Add/Edit User Modal -->
<div class="modal fade" id="userModal" tabindex="-1">
  <div class="modal-dialog"><div class="modal-content">
    <div class="modal-header"><h5 class="modal-title" id="modalTitle">Add User</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
    <div class="modal-body">
      <form id="userForm">
        <input type="hidden" id="userId">
        <div class="row g-3">
          <div class="col-12"><label class="form-label">Full Name *</label><input type="text" class="form-control" id="fName" required></div>
          <div class="col-md-6"><label class="form-label">Username *</label><input type="text" class="form-control" id="fUsername" required></div>
          <div class="col-md-6"><label class="form-label">Email</label><input type="email" class="form-control" id="fEmail"></div>
          <div class="col-md-6"><label class="form-label">Role *</label><select class="form-select" id="fRole" required><option value="">Select role…</option><option>Administrator</option><option>Registrar</option><option>Accountant</option><option>Lecturer</option></select></div>
          <div class="col-md-6"><label class="form-label">Status</label><select class="form-select" id="fStatus"><option value="active">Active</option><option value="inactive">Inactive</option></select></div>
          <div class="col-12" id="pwdField"><label class="form-label">Password *</label><input type="password" class="form-control" id="fPassword" placeholder="Minimum 6 characters"></div>
        </div>
      </form>
    </div>
    <div class="modal-footer"><button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button><button class="btn btn-primary fw-bold" id="saveBtn" onclick="saveUser()"><i class="fas fa-save me-2"></i>Save</button></div>
  </div></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="/assets/js/api.js"></script><script src="/assets/js/main.js"></script><script src="/assets/js/layout.js"></script>
<script>
const modal=new bootstrap.Modal(document.getElementById('userModal'));
let auditPage=1;

initLayout().then(()=>{loadUsers();});

function switchTab(name,btn){
  document.querySelectorAll('.tab-content-panel').forEach(t=>t.classList.add('d-none'));
  document.getElementById('tab-'+name).classList.remove('d-none');
  document.querySelectorAll('.nav-link').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  if(name==='audit')loadAudit(1);
}

async function loadUsers(){
  const res=await API.users.list();
  const tbody=document.getElementById('usersBody');
  if(!res?.data?.length){tbody.innerHTML='<tr><td colspan="9"><div class="empty-state"><i class="fas fa-user-shield"></i><h6>No users found</h6></div></td></tr>';return;}
  document.getElementById('usersBadge').textContent=res.data.length;
  // Populate audit user filter
  const auditSel=document.getElementById('auditUserFilter');
  res.data.forEach(u=>auditSel.insertAdjacentHTML('beforeend',`<option value="${u.UserID}">${u.FullName}</option>`));
  const roleColors={Administrator:'danger',Registrar:'primary',Accountant:'success',Lecturer:'info'};
  tbody.innerHTML=res.data.map((u,i)=>`<tr>
    <td>${i+1}</td>
    <td><img src="${avatarUrl(u.FullName)}" style="width:34px;height:34px;border-radius:50%;object-fit:cover;border:2px solid var(--gold)" alt=""></td>
    <td style="font-weight:700">${u.FullName}</td>
    <td><span class="id-badge">${u.Username}</span></td>
    <td style="font-size:.8rem;color:var(--gray-500)">${u.Email||'—'}</td>
    <td><span class="badge bg-${roleColors[u.Role]||'secondary'}">${u.Role}</span></td>
    <td class="text-center"><span class="badge ${u.Status==='active'?'bg-success':'bg-secondary'}">${u.Status||'active'}</span></td>
    <td style="font-size:.78rem">${u.LastLogin?fmtDateTime(u.LastLogin):'Never'}</td>
    <td class="text-center">
      <button class="btn btn-sm btn-outline-secondary me-1" onclick="editUser(${u.UserID},'${u.FullName.replace(/'/g,"\\'")}','${u.Username}','${u.Email||''}','${u.Role}','${u.Status||'active'}')"><i class="fas fa-edit"></i></button>
      ${u.UserID!==Auth.user()?.id?`<button class="btn btn-sm btn-outline-danger" onclick="deleteUser(${u.UserID},'${u.FullName.replace(/'/g,"\\'")}')"><i class="fas fa-trash"></i></button>`:'<span class="text-muted" style="font-size:.72rem">You</span>'}
    </td></tr>`).join('');
}

function openAdd(){
  document.getElementById('userId').value='';document.getElementById('userForm').reset();
  document.getElementById('pwdField').style.display='';
  document.getElementById('fPassword').required=true;
  document.getElementById('modalTitle').textContent='Add User';modal.show();
}

function editUser(id,name,username,email,role,status){
  document.getElementById('userId').value=id;
  document.getElementById('fName').value=name;
  document.getElementById('fUsername').value=username;
  document.getElementById('fEmail').value=email;
  document.getElementById('fRole').value=role;
  document.getElementById('fStatus').value=status;
  document.getElementById('pwdField').style.display='none';
  document.getElementById('fPassword').required=false;
  document.getElementById('modalTitle').textContent=`Edit — ${name}`;modal.show();
}

async function saveUser(){
  const btn=document.getElementById('saveBtn');
  const id=document.getElementById('userId').value;
  const data={FullName:document.getElementById('fName').value.trim(),Username:document.getElementById('fUsername').value.trim(),Email:document.getElementById('fEmail').value||null,Role:document.getElementById('fRole').value,Status:document.getElementById('fStatus').value};
  if(!id){data.Password=document.getElementById('fPassword').value;if(data.Password.length<6)return showToast('Password must be at least 6 characters.','warning');}
  if(!data.FullName||!data.Username||!data.Role)return showToast('Name, username and role are required.','warning');
  setLoading(btn,true);
  const res=id?await API.users.update(id,data):await API.users.create(data);
  setLoading(btn,false);
  if(!res?.success)return showToast(res?.message||'Failed.','error');
  showToast(res.message||'Saved!','success');modal.hide();loadUsers();
}

async function deleteUser(id,name){
  if(!confirmAction(`Delete user "${name}"? This cannot be undone.`))return;
  const res=await API.users.delete(id);
  if(res?.success){showToast('User deleted.','success');loadUsers();}
  else showToast(res?.message||'Failed.','error');
}

async function loadAudit(page=1){
  auditPage=page;
  const params={page,limit:25,userId:document.getElementById('auditUserFilter').value,action:document.getElementById('auditActionFilter').value};
  const res=await API.users.auditLogs(params);
  const tbody=document.getElementById('auditBody');
  if(!res?.data?.length){tbody.innerHTML='<tr><td colspan="7"><div class="empty-state"><i class="fas fa-history"></i><h6>No audit logs</h6></div></td></tr>';return;}
  document.getElementById('auditPageInfo').textContent=`Showing ${res.data.length} of ${res.pagination?.total||res.data.length}`;
  const actionColors={LOGIN:'success',LOGOUT:'secondary',CREATE:'primary',UPDATE:'warning',DELETE:'danger',VIEW:'info'};
  tbody.innerHTML=res.data.map((l,i)=>`<tr>
    <td>${(page-1)*25+i+1}</td>
    <td style="font-weight:600;font-size:.85rem">${l.FullName||l.Username||'—'}</td>
    <td><span class="badge bg-${actionColors[l.Action]||'secondary'}">${l.Action}</span></td>
    <td style="font-size:.82rem">${l.Module||'—'}</td>
    <td style="font-size:.78rem;max-width:200px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis" title="${(l.Details||'').replace(/"/g,'&quot;')}">${l.Details||'—'}</td>
    <td style="font-size:.78rem;font-family:monospace">${l.IPAddress||'—'}</td>
    <td style="font-size:.75rem">${fmtDateTime(l.CreatedAt)}</td>
  </tr>`).join('');
  renderPagination('auditPagination',page,res.pagination?.totalPages||1,loadAudit);
}

async function changePassword(){
  const btn=document.getElementById('pwdBtn');
  const cur=document.getElementById('pwdCurrent').value;
  const nw=document.getElementById('pwdNew').value;
  const cf=document.getElementById('pwdConfirm').value;
  if(!cur||!nw||!cf)return showToast('All fields are required.','warning');
  if(nw.length<6)return showToast('New password must be at least 6 characters.','warning');
  if(nw!==cf)return showToast('Passwords do not match.','warning');
  setLoading(btn,true);
  const res=await API.auth.changePwd({currentPassword:cur,newPassword:nw});
  setLoading(btn,false);
  if(!res?.success)return showToast(res?.message||'Failed.','error');
  showToast('Password updated successfully!','success');
  document.getElementById('pwdCurrent').value='';document.getElementById('pwdNew').value='';document.getElementById('pwdConfirm').value='';
}
</script>
</body>
</html>
